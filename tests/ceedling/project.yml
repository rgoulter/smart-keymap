---
:project:
  :which_ceedling: gem
  :ceedling_version: 1.0.0
  :build_root: build
  :use_mocks: FALSE

:plugins:
  :enabled:
    - report_tests_pretty_stdout

:paths:
  :test:
    - +:test/**
    - -:test/support
  :source: []
  :include:
    - ../../include
    - generated
  :support:
    - test/support

:unity:
  :defines:
    - UNITY_EXCLUDE_FLOAT
