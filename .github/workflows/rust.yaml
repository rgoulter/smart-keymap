name: Rust Checks

env:
  NICKEL_VERSION: 1.16.0

on:
  push:
    branches:
      - master
    paths:
      - '.cargo/config.toml'
      - 'Cargo.*'
      - 'features/**/*.feature'
      - 'ncl/**/*.ncl'
      - 'src/**/*.rs'
      - 'smart-keymap-nickel-helper/**'
      - 'tests/**/*.rs'
  pull_request:
    branches:
      - '*'
    paths:
      - '.cargo/config.toml'
      - 'Cargo.*'
      - 'features/**/*.feature'
      - 'ncl/**/*.ncl'
      - 'src/**/*.rs'
      - 'smart-keymap-nickel-helper/**'
      - 'tests/**/*.rs'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  cargo-fmt-clippy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: rust-checks

      - name: Install Rust lint components
        run: rustup component add clippy rustfmt

      - name: Setup Nickel
        uses: ./.github/actions/setup-nickel
        with:
          version: ${{ env.NICKEL_VERSION }}

      - name: Run Cargo Fmt
        run: cargo fmt --all -- --check

      - name: Run Cargo Clippy
        run: |
          cargo clippy --workspace \
            --exclude rp2040-rtic-smart-keyboard \
            --exclude stm32f4-rtic-smart-keyboard \
            --exclude stm32-embassy-smart-keyboard \
            -- -D warnings

  cargo-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: rust-checks

      - name: Setup Nickel
        uses: ./.github/actions/setup-nickel
        with:
          version: ${{ env.NICKEL_VERSION }}

      - name: Run Cargo Build
        run: cargo build

      - name: Run Cargo Doc
        run: |
          cargo doc \
            --package=smart-keymap \
            --package=keyberon-smart-keyboard
        env:
          RUSTDOCFLAGS: --deny warnings

      - name: Run Sizes
        run: |
          cargo run --bin sizes | tee sizes.json
          echo "# Sizes" >$GITHUB_STEP_SUMMARY
          echo "\`\`\`" >>$GITHUB_STEP_SUMMARY
          cat sizes.json >>$GITHUB_STEP_SUMMARY
          echo "\`\`\`" >>$GITHUB_STEP_SUMMARY

  cargo-test-lib:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: rust-checks

      - name: Run Cargo Test (lib)
        run: cargo test --lib

  cargo-test-rust-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: rust-checks

      - name: Setup Nickel
        uses: ./.github/actions/setup-nickel
        with:
          version: ${{ env.NICKEL_VERSION }}

      - name: Run Cargo Test (rust-integration)
        run: cargo test --test rust-integration

  cargo-test-cucumber-keymap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: rust-checks

      - name: Setup Nickel
        uses: ./.github/actions/setup-nickel
        with:
          version: ${{ env.NICKEL_VERSION }}

      - name: Run Cargo Test (cucumber-keymap)
        timeout-minutes: 15
        run: cargo test --test cucumber-keymap
