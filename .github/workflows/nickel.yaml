name: Nickel Codegen

env:
  NICKEL_VERSION: 1.16.0

on:
  push:
    branches:
      - master
    paths:
      - 'ncl/**'
      - 'src/**'
      - 'tests/ncl/**'
  pull_request:
    branches:
      - '*'
    paths:
      - 'ncl/**'
      - 'src/**'
      - 'tests/ncl/**'

jobs:
  cargo-build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Nickel
        uses: ./.github/actions/setup-nickel
        with:
          version: ${{ env.NICKEL_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gawk pandoc
          rustup target add riscv32imac-unknown-none-elf

      - name: Run Nickel tests
        run: |
          ./ncl/scripts/run-tests.sh

      - name: Generate feature docs
        run: ./features/scripts/generate-doc.sh
