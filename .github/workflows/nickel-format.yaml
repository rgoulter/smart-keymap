name: Check Nickel Format

env:
  NICKEL_VERSION: 1.16.0

on:
  push:
    branches:
      - master
    paths:
      - 'ncl/**'
      - 'tests/ncl/**'
  pull_request:
    branches:
      - '*'
    paths:
      - 'ncl/**'
      - 'tests/ncl/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Nickel
        uses: ./.github/actions/setup-nickel
        with:
          version: ${{ env.NICKEL_VERSION }}

      - name: Run make ncl-format
        run: make ncl-format

      - name: Check for changes
        run: |
          git diff --exit-code || (echo "There are uncommitted changes. Please run 'make ncl-format' and commit the changes." && exit 1)
