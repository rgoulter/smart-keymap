name: C Checks

env:
  NICKEL_VERSION: 1.16.0

on:
  push:
    branches:
      - master
    paths:
      - '.cargo/**'
      - 'ncl/**/*.ncl'
      - 'src/**'
      - 'smart_keymap/**'
      - 'tests/ceedling/**'
  pull_request:
    branches:
      - '*'
    paths:
      - '.cargo/**'
      - 'ncl/**/*.ncl'
      - 'src/**'
      - 'smart_keymap/**'
      - 'tests/ceedling/**'

jobs:
  unity-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Nickel
        uses: ./.github/actions/setup-nickel
        with:
          version: ${{ env.NICKEL_VERSION }}

      - name: Install dependencies
        run: |
          export PATH=$(gem environment user_gemhome)/bin:$PATH
          export GEM_HOME=$(gem environment user_gemhome)
          gem install bundler --user-install
          bundle install
          wget https://github.com/mozilla/cbindgen/releases/download/0.28.0/cbindgen
          chmod +x ./cbindgen
          sudo cp ./cbindgen /usr/bin/cbindgen

      - name: Run Ceedling Tests
        run: |
          export PATH=$(gem environment user_gemhome)/bin:$PATH
          make test-ceedling
