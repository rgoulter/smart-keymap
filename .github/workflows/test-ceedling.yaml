name: C Checks

env:
  NICKEL_VERSION: 1.16.0

on:
  push:
    branches:
      - master
    paths:
      - '.cargo/**'
      - 'ncl/**/*.ncl'
      - 'src/**'
      - 'smart_keymap/**'
      - 'tests/ceedling/**'
  pull_request:
    branches:
      - '*'
    paths:
      - '.cargo/**'
      - 'ncl/**/*.ncl'
      - 'src/**'
      - 'smart_keymap/**'
      - 'tests/ceedling/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unity-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Nickel
        uses: ./.github/actions/setup-nickel
        with:
          version: ${{ env.NICKEL_VERSION }}

      - name: Install dependencies
        run: |
          export PATH=$(gem environment user_gemhome)/bin:$PATH
          export GEM_HOME=$(gem environment user_gemhome)
          gem install bundler --user-install
          bundle install
      - name: Setup cbindgen
        uses: ./.github/actions/setup-cbindgen

      - name: Install Ruby dependencies
        run: |

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: ceedling

      - name: Run Ceedling Tests
        run: |
          export PATH=$(gem environment user_gemhome)/bin:$PATH
          make test-ceedling
